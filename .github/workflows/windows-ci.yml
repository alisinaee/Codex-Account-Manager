name: Windows CI

on:
  push:
    branches:
      - "**"
    paths:
      - "codex_account_manager/**"
      - "bin/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/windows-ci.yml"
  pull_request:
    paths:
      - "codex_account_manager/**"
      - "bin/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/windows-ci.yml"

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke test (Windows)
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Verify module entry point
        run: python -m codex_account_manager --help

      - name: Verify console script
        run: codex-account --help

      - name: Smoke test add command (mock codex login)
        shell: pwsh
        run: |
          $mockDir = Join-Path $env:RUNNER_TEMP "mock-codex"
          New-Item -ItemType Directory -Path $mockDir -Force | Out-Null
          $cmdPath = Join-Path $mockDir "codex.cmd"
          @'
          @echo off
          setlocal
          if "%1"=="login" (
            if "%CODEX_HOME%"=="" exit /b 2
            if not exist "%CODEX_HOME%" mkdir "%CODEX_HOME%"
            > "%CODEX_HOME%\auth.json" echo {"token":"dummy-token","account":{"email":"ci@example.com"}}
            echo mock login complete
            exit /b 0
          )
          echo unsupported command
          exit /b 1
          '@ | Set-Content -Path $cmdPath -Encoding ASCII
          $env:PATH = "$mockDir;$env:PATH"
          codex-account add win-ci-smoke --timeout 30 --force
          codex-account list --json | Select-String "win-ci-smoke"
